<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renato Gonçalves - PortfolioHUB</title>
    <style>
        :root {
            --bg-main: #050b14;
            --text-main: #e6edf3;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --glow-blue: rgba(88, 166, 255, 0.4);
            --glow-green: rgba(35, 134, 54, 0.6);
        }

        body {
            background: radial-gradient(circle at top, #111a2e 0%, var(--bg-main) 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-container {
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 5px;
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--text-main);
        }

        h3 {
            color: #8b949e;
            font-weight: 300;
            margin-top: 0;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .section-title {
            color: var(--accent-blue);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 35px;
            margin-bottom: 15px;
            font-weight: 600;
            opacity: 0.8;
        }

        .links-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Efeito interativo interno do botão */
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:hover::before {
            width: 400px;
            height: 400px;
        }

        /* Botão Principal em Destaque */
        .btn-green {
            background-color: rgba(35, 134, 54, 0.1);
            color: #3fb950;
            border: 1px solid var(--accent-green);
            box-shadow: 0 4px 15px rgba(35, 134, 54, 0.1);
        }

        .btn-green:hover {
            background-color: var(--accent-green);
            color: white;
            box-shadow: 0 0 20px var(--glow-green);
            transform: translateY(-4px);
        }

        /* Botões Secundários */
        .btn-dark {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .btn-dark:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-blue);
            box-shadow: 0 0 20px var(--glow-blue);
            transform: translateY(-4px);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h1>Renato <span>Gonçalves</span></h1>
        <h3>Ciência de Dados & Machine Learning</h3>
    </div>

    <div class="links-container">
        <div class="section-title">Documento Oficial de Avaliação</div>
        <!-- Coloque o link do seu PDF final aqui no href -->
        <a href="#" class="btn btn-green">📄 Abrir Relatório Técnico (PDF)</a>

        <div class="section-title">Ativos do Ecossistema</div>
        <!-- Substitua os links com os seus endereços reais -->
        <a href="https://github.com/Lopess01/PortfolioHUB" target="_blank" class="btn btn-dark">🌐 Acessar Repositório (GitHub)</a>
        <a href="#" target="_blank" class="btn btn-dark">💼 Abrir Documentação (Currículo)</a>
        <a href="#" target="_blank" class="btn btn-dark">📊 Abrir Apresentação (YouTube)</a>
    </div>

</body>
</html>
