<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Meu PortfolioHUB</title>
    <style>
        /* --- ESTILOS CSS (Estética Tech / Dark Dashboard) --- */
:root {
    --bg-color: #0b0f19; /* Fundo escuro profundo */
    --card-bg: #131a2a; /* Fundo dos cards ligeiramente mais claro */
    --text-main: #e2e8f0;
    --text-muted: #94a3b8;
    --accent-color: #00f2fe; /* Azul neon/ciano para destaques */
    --border-color: #1e293b;
    --hover-glow: rgba(0, 242, 254, 0.15);
}

body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    margin: 0;
    padding: 0;
    line-height: 1.6;
}

header {
    background: linear-gradient(180deg, #1a2235 0%, var(--bg-color) 100%);
    padding: 4rem 1rem 3rem;
    text-align: center;
    border-bottom: 1px solid var(--border-color);
}

header h1 {
    margin: 0 0 0.5rem 0;
    font-size: 3rem;
    letter-spacing: -1px;
    background: linear-gradient(90deg, #fff, var(--accent-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header p {
    color: var(--text-muted);
    font-size: 1.1rem;
    max-width: 500px;
    margin: 0 auto;
}

.container {
    max-width: 1200px;
    margin: 3rem auto;
    padding: 0 1.5rem;
}

.projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2rem;
}

.project-card {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 1.8rem;
    display: flex;
    flex-direction: column;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

/* Efeito de brilho no topo do card */
.project-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: transparent;
    transition: background 0.3s ease;
}

.project-card:hover {
    transform: translateY(-5px);
    border-color: #2d3d5c;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--hover-glow);
}

.project-card:hover::before {
    background: var(--accent-color);
}

.project-card h3 {
    margin-top: 0;
    color: #ffffff;
    font-size: 1.3rem;
    word-break: break-all;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.project-card h3::before {
    content: '/>';
    color: var(--accent-color);
    font-family: monospace;
    font-size: 1rem;
}

.project-card p {
    flex-grow: 1;
    font-size: 0.95rem;
    color: var(--text-muted);
}

.repo-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin: 1.5rem 0;
    padding-top: 1rem;
    border-top: 1px solid rgba(255,255,255,0.05);
}

.btn-github {
    display: block;
    text-align: center;
    background-color: transparent;
    color: var(--accent-color);
    text-decoration: none;
    padding: 0.7rem 1rem;
    border: 1px solid var(--accent-color);
    border-radius: 8px;
    font-weight: 600;
    transition: all 0.2s;
    letter-spacing: 0.5px;
}

.btn-github:hover {
    background-color: var(--accent-color);
    color: #000;
}

.loading {
    text-align: center;
    font-size: 1.2rem;
    color: var(--accent-color);
    grid-column: 1 / -1;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}
    </style>
</head>
<body>

    <header>
        <h1>PortfolioHUB</h1>
        <p>Os meus projetos digitais integrados com o GitHub</p>
    </header>

    <div class="container">
        <div id="github-projects-container" class="projects-grid">
            <p class="loading">A carregar os projetos do GitHub...</p>
        </div>
    </div>

    <script>
        // ATENÇÃO: Substitua pelo seu nome de utilizador do GitHub!
        const githubUsername = 'Lopess01'; 
        
        const apiUrl = `https://api.github.com/users/${githubUsername}/repos?sort=updated&direction=desc`;

        async function fetchGitHubProjects() {
            const container = document.getElementById('github-projects-container');
            
            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`Erro na comunicação com o GitHub: ${response.status}`);
                }
                
                const repos = await response.json();
                
                // Limpa a mensagem de carregamento
                container.innerHTML = '';
                
                // Filtra para remover forks, exibindo apenas projetos originais (opcional)
                const portfolioRepos = repos.filter(repo => !repo.fork);
                
                if (portfolioRepos.length === 0) {
                    container.innerHTML = '<p class="loading">Nenhum repositório público encontrado.</p>';
                    return;
                }

                // Cria os cartões para cada repositório
                portfolioRepos.forEach(repo => {
                    const projectCard = document.createElement('div');
                    projectCard.className = 'project-card';
                    
                    projectCard.innerHTML = `
                        <h3>${repo.name}</h3>
                        <p>${repo.description ? repo.description : 'Sem descrição no momento.'}</p>
                        <div class="repo-stats">
                            <span>⭐ ${repo.stargazers_count}</span>
                            <span>🍴 ${repo.forks_count}</span>
                            <span>${repo.language ? '🔤 ' + repo.language : ''}</span>
                        </div>
                        <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer" class="btn-github">Ver no GitHub</a>
                    `;
                    
                    container.appendChild(projectCard);
                });
                
            } catch (error) {
                console.error('Falha na integração:', error);
                container.innerHTML = '<p class="loading" style="color: red;">Erro ao carregar os projetos. Verifique se o nome de utilizador está correto ou tente novamente mais tarde.</p>';
            }
        }

        // Executa a função quando a página termina de carregar
        document.addEventListener('DOMContentLoaded', fetchGitHubProjects);
    </script>

</body>
</html>
